# Nginx reverse proxy config for VPS deployment
# Place at: /etc/nginx/sites-available/soundup
# Then: sudo ln -s /etc/nginx/sites-available/soundup /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain or server IP

    # Allow large video uploads
    client_max_body_size 500M;

    # Frontend — serve static HTML directly
    location / {
        root /var/www/soundup/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API — proxy to FastAPI
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Long timeout for processing (10 min max)
        proxy_read_timeout    600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout    600s;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }
}
